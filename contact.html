<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 | DevMaster</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-hero {
            padding: 150px 50px 80px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .contact-hero h1 {
            font-size: clamp(32px, 5vw, 48px);
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-hero p {
            color: #888;
            max-width: 600px;
            margin: 0 auto;
            font-size: 16px;
        }

        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 50px 100px;
            position: relative;
            z-index: 1;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .info-item {
            background: var(--card);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.3s;
        }

        .info-item:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .info-item .icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .info-item h3 {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .info-item p {
            color: #888;
            font-size: 14px;
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        .contact-form {
            background: var(--card);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .map-placeholder {
            margin-top: 50px;
            height: 200px;
            background: var(--card);
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: rgba(0, 212, 255, 0.2);
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }

            .contact-container {
                padding: 0 20px 50px;
            }

            .contact-hero {
                padding: 120px 20px 50px;
            }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <div class="code-decoration" style="top: 15%; left: 5%;">await contact.send();</div>
    <div class="code-decoration" style="bottom: 20%; right: 5%;">console.log('Hello');</div>

    <nav>
        <a href="index.html" class="logo">&lt;DevMaster/&gt;</a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="projects.html">项目</a></li>
            <li><a href="skills.html">技能</a></li>
            <li><a href="contact.html">联系</a></li>
        </ul>
    </nav>

    <section class="contact-hero">
        <h1>联系我</h1>
        <p>有项目想法？想要合作？或者只是想打个招呼？随时欢迎联系。</p>
    </section>

    <div class="contact-container">
        <div class="contact-grid">
            <div class="contact-info">
                <div class="info-item">
                    <div class="icon">📧</div>
                    <h3>邮箱</h3>
                    <p>devmaster@example.com</p>
                </div>
                <div class="info-item">
                    <div class="icon">📱</div>
                    <h3>电话</h3>
                    <p>+86 138 8888 8888</p>
                </div>
                <div class="info-item">
                    <div class="icon">📍</div>
                    <h3>地址</h3>
                    <p>中国 · 上海</p>
                </div>
                <div class="info-item">
                    <div class="icon">🔗</div>
                    <h3>社交媒体</h3>
                    <div class="social-links">
                        <a href="#">G</a>
                        <a href="#">T</a>
                        <a href="#">L</a>
                        <a href="#">W</a>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form onsubmit="event.preventDefault(); alert('消息已发送！');">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" placeholder="你的名字" required>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>主题</label>
                        <input type="text" placeholder="项目合作 / 技术咨询 / 其他" required>
                    </div>
                    <div class="form-group">
                        <label>留言</label>
                        <textarea placeholder="想对我说什么..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">发送消息</button>
                </form>
            </div>
        </div>

        <div class="map-placeholder">🗺️</div>
    </div>

    <div class="status-bar">
        <div class="status-dot"></div>
        <span>System Online</span>
    </div>

    <script>
        const particles = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particles.appendChild(p);
        }
    </script>
</body>
</html>
